site_name: ML Atlas
site_description: 按主题模块化的深度学习与机器学习及相关数学基础知识库。
site_url: https://ml-atlas-production.up.railway.app
repo_url: https://github.com/miracleyang-dev/machine-learning-handbook
repo_name: miracleyang-dev/machine-learning-handbook

theme:
  name: material
  language: zh
  # Google Fonts disabled: self-hosted @font-face declared in stylesheets/extra.css
  # (avoids fonts.googleapis.com blocking / slow loads in restricted networks)
  font: false
  features:
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  icon:
    repo: fontawesome/brands/github
    logo: material/atom-variant

extra_css:
  # KaTeX CSS is self-hosted via docs/scripts/fetch-assets.sh -> docs/assets/katex/
  - assets/katex/katex.min.css
  - stylesheets/extra.css

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  # KaTeX JS is self-hosted via docs/scripts/fetch-assets.sh -> docs/assets/katex/
  - assets/katex/katex.min.js
  - assets/katex/contrib/auto-render.min.js
  - stylesheets/katex-init.js

extra:
  generator: false

# Exclude build-time fetched assets and the fetch script from mkdocs page
# scanning. Without this, mkdocs --strict aborts on KaTeX's bundled README.md
# ("page exists in docs/ but not in nav"). Files are still copied to the
# built site as static resources.
exclude_docs: |
  assets/
  scripts/

nav:
  - 首页: index.md
  - T01 · SVD / PCA / LDA: T01-svd-pca-lda/index.md
  - T02 · Matrix Calculus: T02-matrix-calculus/index.md
  - T03 · KKT & Duality: T03-kkt-duality/index.md
  - T04 · DL Optimizers: T04-dl-optimizers/index.md
